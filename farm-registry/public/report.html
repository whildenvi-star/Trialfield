<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Report — Farm Registry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2d5a27;
      --text: #1a1a1a;
      --text-light: #666;
      --border: #ddd;
      --bg: #f5f5f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      line-height: 1.4;
      padding: 1.5rem 2rem;
      background: white;
    }

    .report-header {
      margin-bottom: 1.25rem;
      border-bottom: 3px solid var(--primary);
      padding-bottom: 0.75rem;
    }

    .report-header h1 {
      font-size: 1.4rem;
      color: var(--primary);
    }

    .report-header .subtitle {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 0.2rem;
    }

    .no-print { display: inline-block; }

    .btn-back {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }

    .btn-back:hover { background: #3d7a35; }

    .btn-print {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      background: none;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-left: 0.5rem;
    }

    .btn-print:hover { background: #f0fdf4; }

    /* --- Summary bar --- */
    .summary-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .summary-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 1rem;
      min-width: 100px;
      flex: 1;
    }

    .summary-card .label {
      font-size: 0.65rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-card .value {
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 0.1rem;
    }

    .summary-card .value.organic { color: #16a34a; }

    /* --- Report table --- */
    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .report-table th {
      background: #f8f8f5;
      padding: 0.45rem 0.5rem;
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .report-table th.number { text-align: right; }

    .report-table td {
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid #f0f0ea;
      vertical-align: middle;
    }

    .report-table tr:hover { background: #fafaf5; }

    .number { text-align: right; font-variant-numeric: tabular-nums; }

    .report-table .totals-row {
      font-weight: 700;
      background: #f0f0ea;
      border-top: 2px solid var(--border);
    }

    .badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .badge-rented { background: #dbeafe; color: #1d4ed8; }
    .badge-owned { background: #fef3c7; color: #92400e; }
    .badge-mixed { background: #f3e8ff; color: #7c3aed; }

    .cert-badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .cert-organic { background: #dcfce7; color: #16a34a; }
    .cert-conventional { background: #f5f5f0; color: #666; }
    .cert-transitional { background: #fef3c7; color: #92400e; }
    .cert-split { background: #e0e7ff; color: #4338ca; }

    .shp-thumb {
      width: 80px;
      height: 54px;
      display: block;
    }

    .shp-none {
      color: #ccc;
      font-size: 0.75rem;
    }

    #loading {
      padding: 2rem;
      text-align: center;
      color: var(--text-light);
    }

    .delta-ok { color: #16a34a; }
    .delta-warn { color: #dc2626; }

    /* --- Print styles --- */
    @media print {
      body { padding: 0.5cm; }
      .no-print { display: none !important; }
      .summary-card { background: white; border: 1px solid #ccc; }
      .report-table th { background: white; -webkit-print-color-adjust: exact; }
      .report-table tr:hover { background: none; }
      .report-table .totals-row { background: #f0f0ea; -webkit-print-color-adjust: exact; }
      .badge, .cert-badge, .delta-ok, .delta-warn { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .report-header { border-bottom-color: #333; }
    }
  </style>
</head>
<body>
  <div class="no-print">
    <a href="/" class="btn-back">Back to Registry</a>
    <button class="btn-print" onclick="window.print()">Print Report</button>
  </div>

  <div class="report-header">
    <h1>Farm Registry — Field Report</h1>
    <div class="subtitle">W. Hughes Farms, G.P. | Generated <span id="report-date"></span></div>
  </div>

  <div class="summary-bar" id="summary-bar"></div>

  <div id="loading">Loading fields...</div>

  <table class="report-table" id="report-table" style="display:none;">
    <thead>
      <tr>
        <th>Field</th>
        <th class="number">Acres</th>
        <th>Ownership</th>
        <th>Certification</th>
        <th class="number">Rented Till.</th>
        <th class="number">Owned Till.</th>
        <th class="number">Non-Till.</th>
        <th class="number">FSA Crop</th>
        <th class="number">FSA Other</th>
        <th class="number">Delta</th>
        <th>Boundary</th>
      </tr>
    </thead>
    <tbody id="report-tbody"></tbody>
  </table>

  <script src="report.js"></script>
</body>
</html>
